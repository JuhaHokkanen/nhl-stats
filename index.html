<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Kierrosraportti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .team-logo { filter: drop-shadow(0 0 4px rgba(0,0,0,0.3)); }
    </style>
</head>
<body class="text-slate-200 p-4 sm:p-8 min-h-screen">
    <div class="max-w-2xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500 mb-2">NHL Kierros & Tilastot</h1>
            <div class="flex items-center justify-between bg-slate-900/50 rounded-full p-1 border border-slate-800 shadow-lg">
                <button onclick="changeDate(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full text-slate-400 font-bold text-lg">←</button>
                <input type="date" id="datePicker" onchange="selectDate(this.value)" class="bg-transparent text-sm font-bold text-white outline-none cursor-pointer px-4">
                <button onclick="changeDate(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full text-slate-400 font-bold text-lg">→</button>
            </div>
        </header>
        <div id="loading" class="hidden text-center py-20 text-blue-500 text-[10px] font-bold uppercase tracking-[0.2em] animate-pulse">Ladataan otteluita...</div>
        <div id="resultsContainer" class="space-y-12 pb-24"></div>
    </div>

    <script>
        let currentDate = new Date();
        if (currentDate.getHours() < 14) currentDate.setDate(currentDate.getDate() - 1);
        
        const datePicker = document.getElementById('datePicker');
        datePicker.value = currentDate.toISOString().split('T')[0];

        function selectDate(val) { currentDate = new Date(val); fetchNHLResults(); }
        function changeDate(days) { 
            currentDate.setDate(currentDate.getDate() + days); 
            datePicker.value = currentDate.toISOString().split('T')[0];
            fetchNHLResults(); 
        }

        async function fetchNHLResults() {
            const container = document.getElementById('resultsContainer');
            const loading = document.getElementById('loading');
            const dateStr = datePicker.value;
            
            container.innerHTML = '';
            loading.classList.remove('hidden');
            
            try {
                // Haetaan data oman Workers-reitin kautta
                const response = await fetch('/api/score?date=' + dateStr);
                const data = await response.json();
                
                if (!data.games || data.games.length === 0) {
                    container.innerHTML = '<p class="text-center text-slate-600 italic py-10">Ei otteluita tänä päivänä.</p>';
                } else {
                    data.games.forEach(game => {
                        const isStarted = game.gameState !== 'FUT' && game.gameState !== 'PRE';
                        const div = document.createElement('div');
                        div.className = "bg-slate-900/40 p-6 rounded-3xl border border-slate-800/50 shadow-xl mb-8";
                        
                        let html = `
                            <div class="flex items-center justify-between mb-6">
                                <div class="flex items-center gap-3">
                                    <img src="https://assets.nhle.com/logos/nhl/svg/${game.awayTeam.abbrev}_light.svg" class="w-10 h-10 team-logo">
                                    <span class="text-xl font-black italic uppercase">${game.awayTeam.abbrev}</span>
                                    <span class="text-slate-700 font-bold text-xs px-1">@</span>
                                    <span class="text-xl font-black italic uppercase">${game.homeTeam.abbrev}</span>
                                    <img src="https://assets.nhle.com/logos/nhl/svg/${game.homeTeam.abbrev}_light.svg" class="w-10 h-10 team-logo">
                                </div>
                                <div class="text-2xl font-black text-blue-500 tabular-nums">
                                    ${isStarted ? game.awayTeam.score + ' - ' + game.homeTeam.score : '---'}
                                </div>
                            </div>
                        `;

                        if (isStarted && game.goals) {
                            html += '<div class="space-y-3 pt-4 border-t border-slate-800/30">';
                            game.goals.forEach(goal => {
                                html += `
                                    <div class="flex justify-between items-center text-sm">
                                        <span class="font-bold text-slate-300">${goal.firstName.default} ${goal.lastName.default} <span class="text-[10px] text-slate-600 uppercase ml-1">${goal.teamAbbrev.default}</span></span>
                                        <span class="text-[10px] font-mono text-slate-500">${goal.period}. erä ${goal.timeInPeriod}</span>
                                    </div>`;
                            });
                            html += '</div>';
                        }
                        
                        div.innerHTML = html;
                        container.appendChild(div);
                    });
                }
            } catch (err) {
                container.innerHTML = '<p class="text-center text-red-500 font-black text-xs uppercase tracking-widest py-10">Yhteysvirhe API-reittiin</p>';
            }
            loading.classList.add('hidden');
        }
        fetchNHLResults();
    </script>
</body>
</html>
