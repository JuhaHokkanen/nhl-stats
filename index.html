<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Kierrosraportti - Cloudflare Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .team-logo { filter: drop-shadow(0 0 4px rgba(0,0,0,0.3)); }
    </style>
</head>
<body class="text-slate-200 p-4 sm:p-8 min-h-screen">

    <div class="max-w-2xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500 mb-2">NHL Kierros & Tilastot</h1>
            <div class="flex items-center justify-between bg-slate-900/50 rounded-full p-1 border border-slate-800 shadow-lg">
                <button onclick="changeDate(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full transition-all text-slate-400 font-bold text-lg">←</button>
                <input type="date" id="datePicker" onchange="selectDate(this.value)" class="bg-transparent text-sm font-bold text-white outline-none cursor-pointer px-4">
                <button onclick="changeDate(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full transition-all text-slate-400 font-bold text-lg">→</button>
            </div>
        </header>

        <div id="loading" class="hidden text-center py-20 text-blue-500 text-[10px] font-bold uppercase tracking-[0.2em] animate-pulse">Päivitetään tilanteita...</div>
        <div id="resultsContainer" class="space-y-16 pb-24"></div>
    </div>

    <script>
        // Asetetaan oletuspäivämäärä (Suomen aamuna edellinen yö)
        let currentDate = new Date();
        if (currentDate.getHours() < 14) currentDate.setDate(currentDate.getDate() - 1);
        
        const datePicker = document.getElementById('datePicker');
        datePicker.value = currentDate.toISOString().split('T')[0];

        function selectDate(val) { currentDate = new Date(val); fetchNHLResults(); }
        function changeDate(days) { 
            currentDate.setDate(currentDate.getDate() + days); 
            datePicker.value = currentDate.toISOString().split('T')[0];
            fetchNHLResults(); 
        }

        function formatPeriod(period) {
            if (period === 4) return "JA";
            if (period === 5) return "VL";
            return period + ". erä";
        }

        function getLogoUrl(abbr) {
            return `https://assets.nhle.com/logos/nhl/svg/${abbr}_light.svg`;
        }

        async function fetchNHLResults() {
            const container = document.getElementById('resultsContainer');
            const loadingDiv = document.getElementById('loading');
            const dateStr = datePicker.value;
            
            container.innerHTML = '';
            loadingDiv.classList.remove('hidden');

            // --- VÄLIMUISTI-LOGIIKKA ---
            const cacheKey = `nhl_v3_${dateStr}`;
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                const { data, time } = JSON.parse(cached);
                if (Date.now() - time < 600000) { // 10 minuutin välimuisti
                    renderGames(data.games);
                    loadingDiv.classList.add('hidden');
                    return;
                }
            }

            try {
                const targetUrl = `https://api-web.nhle.com/v1/score/${dateStr}`;
                // Käytetään allorigins-proxyä vakauden vuoksi
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                if (data && data.games) {
                    localStorage.setItem(cacheKey, JSON.stringify({ data, time: Date.now() }));
                    renderGames(data.games);
                } else {
                    container.innerHTML = `<p class="text-center text-slate-600 italic">Ei otteluita tänä päivänä.</p>`;
                }
            } catch (err) {
                container.innerHTML = `<p class="text-center text-red-500">Yhteysvirhe. Yritä uudelleen.</p>`;
            }
            loadingDiv.classList.add('hidden');
        }

        async function renderGames(games) {
            const container = document.getElementById('resultsContainer');
            for (const game of games) {
                const isStarted = game.gameState !== 'FUT' && game.gameState !== 'PRE';
                const gameDiv = document.createElement('div');
                gameDiv.className = "animate-in fade-in slide-in-from-bottom-2 duration-500 border-b border-slate-800/50 pb-12 last:border-0";
                
                let html = `
                    <div class="mb-8 bg-slate-900/30 p-6 rounded-3xl border border-slate-800/40">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 flex-1">
                                <img src="${getLogoUrl(game.awayTeam.abbrev)}" class="w-10 h-10 team-logo">
                                <span class="text-2xl font-black text-white italic uppercase tracking-tighter">${game.awayTeam.abbrev}</span>
                                <span class="text-slate-700 font-bold text-xs">@</span>
                                <span class="text-2xl font-black text-white italic tracking-tighter uppercase">${game.homeTeam.abbrev}</span>
                                <img src="${getLogoUrl(game.homeTeam.abbrev)}" class="w-10 h-10 team-logo">
                            </div>
                            <div class="text-3xl font-black ${isStarted ? 'text-blue-500' : 'text-slate-600'} tabular-nums">
                                ${isStarted ? `${game.awayTeam.score} - ${game.homeTeam.score}` : '---'}
                            </div>
                        </div>
                        ${isStarted ? `<a href="https://www.nhl.com/gamecenter/${game.id}" target="_blank" class="block mt-4 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-blue-400">Kooste →</a>` : ''}
                    </div>
                    <div class="space-y-4 px-2 mb-8 text-sm">`;

                if (isStarted && game.goals) {
                    game.goals.forEach(goal => {
                        html += `
                            <div class="flex justify-between items-baseline border-l-2 border-slate-800 pl-4 py-1">
                                <span class="font-bold text-slate-200">${goal.firstName.default} ${goal.lastName.default} (${goal.teamAbbrev.default})</span>
                                <span class="text-[10px] font-mono text-slate-500">${formatPeriod(goal.period)} ${goal.timeInPeriod}</span>
                            </div>`;
                    });
                }
                html += `</div>`;
                gameDiv.innerHTML = html;
                container.appendChild(gameDiv);
            }
        }

        fetchNHLResults();
    </script>
</body>
</html>
