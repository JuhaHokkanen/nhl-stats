<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Tulokset, Videot & Maalivahdit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="text-slate-200 p-4 sm:p-8 min-h-screen">

    <div class="max-w-xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500 mb-2">NHL Kierros & Tilastot</h1>
            <div class="flex items-center justify-between bg-slate-900/50 rounded-full p-1 border border-slate-800 shadow-lg">
                <button onclick="changeDate(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full transition-all text-slate-400">←</button>
                <input type="date" id="datePicker" onchange="selectDate(this.value)" class="bg-transparent text-sm font-bold text-white outline-none cursor-pointer px-4">
                <button onclick="changeDate(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 rounded-full transition-all text-slate-400">→</button>
            </div>
        </header>

        <div id="loading" class="hidden text-center py-20 text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Päivitetään tilanteita...</div>
        <div id="resultsContainer" class="space-y-16"></div>
    </div>

    <script>
        let currentDate = new Date();
        currentDate.setHours(currentDate.getHours() - 8);
        document.getElementById('datePicker').value = currentDate.toISOString().split('T')[0];

        function selectDate(val) { currentDate = new Date(val); fetchNHLResults(); }
        function changeDate(days) { 
            currentDate.setDate(currentDate.getDate() + days); 
            document.getElementById('datePicker').value = currentDate.toISOString().split('T')[0];
            fetchNHLResults(); 
        }

        function formatPeriod(period) {
            if (period === 4) return "JA";
            if (period === 5) return "VL";
            return period + ". erä";
        }

        async function fetchNHLResults() {
            const container = document.getElementById('resultsContainer');
            const loadingDiv = document.getElementById('loading');
            const dateStr = currentDate.toISOString().split('T')[0];
            
            container.innerHTML = '';
            loadingDiv.classList.remove('hidden');

            try {
                const scoreUrl = `https://corsproxy.io/?${encodeURIComponent('https://api-web.nhle.com/v1/score/' + dateStr)}`;
                const response = await fetch(scoreUrl);
                const data = await response.json();
                const games = data.games || [];
                loadingDiv.classList.add('hidden');

                if (games.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-600 text-sm font-medium italic">Ei otteluita tänä päivänä.</div>`;
                    return;
                }

                for (const game of games) {
                    const gameSection = document.createElement('div');
                    gameSection.className = "animate-in fade-in slide-in-from-bottom-4 duration-700";
                    
                    const isStarted = game.gameState !== 'FUT' && game.gameState !== 'PRE';
                    const gameVideoUrl = `https://www.nhl.com/gamecenter/${game.id}`;

                    let scoreDisplay = isStarted 
                        ? `<span>${game.awayTeam.score} - ${game.homeTeam.score}</span>`
                        : `<span class="text-xs uppercase tracking-widest text-slate-600 italic">Ei alkanut</span>`;

                    let html = `
                        <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
                            <div class="flex flex-col">
                                <span class="text-2xl font-black text-white italic uppercase">${game.awayTeam.abbrev} @ ${game.homeTeam.abbrev}</span>
                                ${isStarted ? `<a href="${gameVideoUrl}" target="_blank" class="text-[10px] font-black text-blue-500 mt-2 uppercase tracking-widest hover:underline">Katso kooste →</a>` : ''}
                            </div>
                            <div class="text-3xl font-black text-slate-400 tabular-nums">${scoreDisplay}</div>
                        </div>`;

                    // MAALIT
                    html += `<div class="mb-8 space-y-4">
                                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Maalit</h3>`;
                    if (isStarted && game.goals && game.goals.length > 0) {
                        game.goals.forEach(goal => {
                            let assists = goal.assists ? goal.assists.map(a => a.name.default).join(', ') : 'Ilman syöttäjiä';
                            html += `
                                <div class="pl-4 border-l-2 border-slate-800 py-1">
                                    <div class="flex justify-between items-baseline text-sm">
                                        <span class="font-bold text-slate-200">${goal.firstName.default} ${goal.lastName.default} <span class="text-[10px] text-slate-500 ml-1 uppercase">${goal.teamAbbrev.default || goal.teamAbbrev}</span></span>
                                        <span class="text-[10px] font-mono text-slate-500">${formatPeriod(goal.period)} ${goal.timeInPeriod}</span>
                                    </div>
                                    <p class="text-[11px] text-slate-500 italic">${assists}</p>
                                </div>`;
                        });
                    } else {
                        html += `<p class="text-[10px] text-slate-700 italic uppercase">Ei maaleja</p>`;
                    }
                    html += `</div>`;

                    // MAALIVAHDIT (Boxscore-data)
                    if (isStarted) {
                        try {
                            const boxUrl = `https://corsproxy.io/?${encodeURIComponent('https://api-web.nhle.com/v1/gamecenter/' + game.id + '/boxscore')}`;
                            const boxRes = await fetch(boxUrl);
                            const boxData = await boxRes.json();
                            
                            html += `<div class="space-y-4">
                                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Maalivahdit (Torjunnat/Vedot)</h3>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;

                            ['awayTeam', 'homeTeam'].forEach(side => {
                                const goalies = boxData.playerByGameStats[side].goalies;
                                goalies.forEach(g => {
                                    html += `
                                        <div class="bg-slate-900/30 rounded-lg p-3 border border-slate-800/50">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="text-xs font-bold text-slate-300">${g.name.default} (${boxData[side].abbrev})</span>
                                                <span class="text-[10px] font-black text-slate-500 uppercase">${g.savePctg || '.000'}</span>
                                            </div>
                                            <div class="text-[11px] text-slate-400 font-medium">
                                                Torjunnat: <span class="text-slate-200">${g.saves}/${g.shots}</span>
                                            </div>
                                        </div>`;
                                });
                            });
                            html += `</div></div>`;
                        } catch (e) { console.log("Boxscore error", e); }
                    }

                    gameSection.innerHTML = html;
                    container.appendChild(gameSection);
                }
            } catch (err) {
                loadingDiv.innerHTML = "VIRHE TIETOJEN HAUSSA.";
            }
        }
        fetchNHLResults();
    </script>
</body>
</html>
